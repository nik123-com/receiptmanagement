<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipt Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="column">
            <div class="header">Admin</div>
            <h3>Add a new Product</h3>
            <div class="row">
                <input id="inp1" type="text" placeholder="Product Name">
                <button onclick="selection()">Add Product</button>
            </div>
            <h3>Select a product then add the price per unit</h3>
            <select id="options"></select>
            <div class="row">
                <input type="text" placeholder="Price" id="price">
                <button id="add" onclick="add()">Add Price</button>
            </div>
            <div id="alert"></div>
        </div>
        <div class="column">
            <div class="header">Checkout</div>
            <div class="center">
                <button class="wide-btn" onclick="transaction()">New Transaction</button>
                <h3>Select a product then add the number of units</h3>
                <div class="row">
                    <select class="flex" id="checkoutSelect"></select>
                    <label>Unit:</label>
                    <input type="number" value="0" class="unit-input" id="unit">
                </div>
                <button class="wide-btn" onclick="addtocart()">Add to Cart</button>
                <div class="number button" id="digit">
                    <button onclick="press(1)">1</button>
                    <button onclick="press(2)">2</button>
                    <button onclick="press(3)">3</button>
                    <button onclick="press(4)">4</button>
                    <button onclick="press(5)">5</button>
                    <button onclick="press(6)">6</button>
                    <button onclick="press(7)">7</button>
                    <button onclick="press(8)">8</button>
                    <button onclick="press(9)" class="nine">9</button>
                </div>
                <button class="pay" onclick="receipt()" >Pay Now</button>
            </div>
        </div>
        <div class="column">
            <div class="header">Receipt</div>
            <div class="parent">
                <div class="receipt-table" id="table">
                    <div>Product</div>
                    <div>Rate(₹)</div>
                    <div>Unit(s)</div>
                    <div>Total</div>
                </div>
                <div class="output" id="output"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
